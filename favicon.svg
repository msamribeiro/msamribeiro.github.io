<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4A020"/>
      <stop offset="100%" stop-color="#C49010"/>
    </linearGradient>
    <clipPath id="circle-clip">
      <circle cx="16" cy="16" r="16"/>
    </clipPath>
  </defs>

  <!-- Circular background -->
  <circle cx="16" cy="16" r="16" fill="#1A1816"/>

  <!-- Waveform bars tapering left to right (clipped to circle) -->
  <g clip-path="url(#circle-clip)">
    <rect x="3.6"  y="6.9"  width="2.6" height="18.2" rx="1.3" fill="url(#g)"/>
    <rect x="8.0"  y="9.9"  width="2.6" height="12.2" rx="1.3" fill="url(#g)"/>
    <rect x="12.4" y="12.4" width="2.6" height="7.2"  rx="1.3" fill="url(#g)"/>
    <rect x="16.8" y="13.9" width="2.6" height="4.2"  rx="1.3" fill="url(#g)"/>
    <rect x="21.2" y="14.9" width="2.6" height="2.2"  rx="1.3" fill="url(#g)"/>

    <!-- Neural node ring -->
    <circle cx="27.0" cy="16" r="2.7" fill="#D4A020"/>
    <circle cx="27.0" cy="16" r="1.2" fill="#1A1816"/>
  </g>
</svg>
